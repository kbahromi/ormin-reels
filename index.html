<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сценарии Reels — Орминь</title>
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f3ef;
  --surface: #ffffff;
  --surface2: #f0ede8;
  --border: #e0dbd3;
  --border2: #ccc8bf;
  --text: #1a1916;
  --text2: #6b6760;
  --text3: #9e9b96;
  --accent: #1a1916;
  --accent-text: #ffffff;
  --teal: #0f6e56;
  --teal-bg: #e1f5ee;
  --amber: #854f0b;
  --amber-bg: #faeeda;
  --info: #185fa5;
  --info-bg: #e6f1fb;
  --radius: 10px;
  --radius-lg: 14px;
}

body {
  font-family: 'Geologica', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 2rem 1rem;
}

.page {
  max-width: 780px;
  margin: 0 auto;
}

header {
  margin-bottom: 2rem;
}

.logo {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 6px;
}

h1 {
  font-size: 26px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.2;
}

.api-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1rem 1.25rem;
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 10px;
}

.api-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--border2);
  flex-shrink: 0;
  transition: background 0.2s;
}
.api-dot.ok { background: #1d9e75; }

.api-bar input {
  flex: 1;
  border: none;
  background: transparent;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text2);
  outline: none;
}
.api-bar input::placeholder { color: var(--text3); }

.api-save {
  font-size: 12px;
  padding: 5px 14px;
  border: 1px solid var(--border2);
  border-radius: 6px;
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  font-family: 'Geologica', sans-serif;
  transition: all 0.15s;
}
.api-save:hover { background: var(--surface2); }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.5rem;
  margin-bottom: 1.25rem;
}

.card-title {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 1rem;
}

.spec-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 7px;
  margin-bottom: 0;
}

.spec-btn {
  padding: 8px 10px;
  font-size: 13px;
  font-family: 'Geologica', sans-serif;
  font-weight: 400;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  line-height: 1.3;
}
.spec-btn:hover { border-color: var(--border2); color: var(--text); }
.spec-btn.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.field { display: flex; flex-direction: column; gap: 6px; }
.field.full { grid-column: 1 / -1; }

label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  letter-spacing: 0.03em;
}

input[type=text], select, textarea {
  font-family: 'Geologica', sans-serif;
  font-size: 14px;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface2);
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
  width: 100%;
}
input[type=text]:focus, select:focus, textarea:focus { border-color: var(--border2); background: var(--surface); }
textarea { resize: vertical; min-height: 72px; line-height: 1.5; }
select { cursor: pointer; }

.btn-gen {
  width: 100%;
  padding: 12px;
  font-family: 'Geologica', sans-serif;
  font-size: 14px;
  font-weight: 500;
  background: var(--accent);
  color: var(--accent-text);
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  margin-top: 4px;
  transition: opacity 0.15s, transform 0.1s;
  letter-spacing: 0.02em;
}
.btn-gen:hover { opacity: 0.88; }
.btn-gen:active { transform: scale(0.99); }
.btn-gen:disabled { opacity: 0.35; cursor: not-allowed; }

.status {
  text-align: center;
  font-size: 13px;
  color: var(--text3);
  padding: 0.5rem 0;
  min-height: 28px;
}

.error {
  text-align: center;
  font-size: 13px;
  color: #a32d2d;
  padding: 0.5rem 0;
}

.result { display: none; }
.result.visible { display: block; }

.result-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 0.75rem;
  gap: 12px;
}

.result-name {
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.3;
}

.result-badge {
  font-size: 11px;
  color: var(--text3);
  margin-top: 3px;
}

.btn-copy {
  font-family: 'Geologica', sans-serif;
  font-size: 12px;
  padding: 6px 14px;
  border: 1px solid var(--border2);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text2);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  flex-shrink: 0;
}
.btn-copy:hover { background: var(--surface2); }

.table-wrap {
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  table-layout: fixed;
}

thead th {
  background: var(--surface2);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 10px 14px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
th:nth-child(1) { width: 37%; }
th:nth-child(2) { width: 37%; }
th:nth-child(3) { width: 26%; }

td {
  padding: 11px 14px;
  vertical-align: top;
  border-bottom: 1px solid var(--border);
  line-height: 1.55;
  color: var(--text);
  word-break: break-word;
}
tr:last-child td { border-bottom: none; }
tr:nth-child(even) td { background: #faf9f7; }

.row-n {
  font-size: 10px;
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
  display: block;
  margin-bottom: 4px;
}

.vtag {
  display: inline-block;
  font-size: 10px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 20px;
  margin-bottom: 5px;
  letter-spacing: 0.04em;
}
.vtag-head { background: #e6f1fb; color: #185fa5; }
.vtag-cut { background: #f0ede8; color: #6b6760; border: 1px solid #e0dbd3; }
.vtag-cut-stock { background: #ede8f5; color: #6040a0; border: 1px solid #d8d0ee; }
.vtag-anim { background: #faeeda; color: #854f0b; }
.vtag-schema { background: #e1f5ee; color: #0f6e56; }
.vtag-demo { background: #fce8e8; color: #a32d2d; }
.vtag-text { background: #f5f3ef; color: #1a1916; border: 1px solid #ccc8bf; }

.caption-text {
  font-weight: 500;
  color: var(--text);
  font-size: 12px;
  line-height: 1.4;
}

.caption-empty { color: var(--text3); }

.btn-regen {
  width: 100%;
  margin-top: 0.75rem;
  padding: 9px;
  font-family: 'Geologica', sans-serif;
  font-size: 13px;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  transition: background 0.15s;
}
.btn-regen:hover { background: var(--surface2); }

@media (max-width: 540px) {
  .form-grid { grid-template-columns: 1fr; }
  .spec-grid { grid-template-columns: repeat(3, 1fr); }
  h1 { font-size: 22px; }
}
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="logo">Клиника Орминь · Душанбе</div>
    <h1>Генератор сценариев Reels</h1>
  </header>

  <input type="hidden" id="apiKey" value="REPLACE_WITH_YOUR_KEY">


  <div class="card">
    <div class="card-title">Специальность</div>
    <div class="spec-grid" id="specGrid"></div>
  </div>

  <div class="card">
    <div class="card-title">Параметры сценария</div>
    <div class="form-grid">
      <div class="field full">
        <label>Тема / диагноз</label>
        <input type="text" id="topic" placeholder="Например: диабет 2 типа, акне, мигрень...">
      </div>
      <div class="field">
        <label>Формат</label>
        <select id="format">
          <option value="myth">Миф → правда</option>
          <option value="pain">Боль → решение</option>
          <option value="education">Образовательный</option>
          <option value="symptom">Симптом → приём</option>
        </select>
      </div>
      <div class="field">
        <label>Аудитория</label>
        <select id="audience">
          <option value="patients">Пациенты (общее)</option>
          <option value="young">Молодые (20–35)</option>
          <option value="elderly">Пожилые (50+)</option>
          <option value="parents">Родители</option>
          <option value="women">Женщины</option>
          <option value="men">Мужчины</option>
        </select>
      </div>
      <div class="field">
        <label>Длина</label>
        <select id="duration">
          <option value="60">~60 сек</option>
          <option value="90">~90 сек</option>
          <option value="45">~45 сек</option>
        </select>
      </div>
      <div class="field full">
        <label>Дополнительный контекст (необязательно)</label>
        <textarea id="context" placeholder="Акцент, конкретные препараты, что избегать..."></textarea>
      </div>
    </div>
    <button class="btn-gen" id="genBtn" onclick="generate()">Сгенерировать сценарий →</button>
  </div>

  <div class="status" id="status"></div>
  <div class="error" id="errorMsg"></div>

  <div class="result" id="result">
    <div class="result-header">
      <div>
        <div class="result-name" id="resultName"></div>
        <div class="result-badge" id="resultBadge"></div>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="btn-copy" id="editBtn" onclick="toggleEdit()">Редактировать</button>
        <button class="btn-copy" id="saveEditsBtn" onclick="saveEdits()" style="display:none; color:var(--teal);">Сохранить правки</button>
        <button class="btn-copy" onclick="copyTable()">Копировать</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Текст (слова)</th>
            <th>Визуальный ряд</th>
            <th>Акцентные титры</th>
            <th style="width:70px; text-align:center;">Время</th>
          </tr>
        </thead>
        <tfoot id="tableFoot"></tfoot>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <button class="btn-regen" onclick="generate()">Перегенерировать →</button>
  </div>

</div>

<script>
const SPECS = [
  { id:"neurology",    label:"Невролог",       ctx:"Темы: мигрень, инсульт, эпилепсия, головокружение, нейропатия, деменция. Мифы: остеохондроз, сосуды головного мозга, внутричерепное давление, чистка сосудов. Аудитория — люди с хронической болью и страхом. Акцент на доказательное лечение без лишних таблеток." },
  { id:"gynecology",   label:"Гинеколог",      ctx:"Темы: СПКЯ, эндометриоз, менопауза, ПМС, контрацепция, беременность, бесплодие. Мифы о гормонах, 'чистках', народных средствах. Аудитория — женщины 20–45. Тон: уважение к телу, без запугивания." },
  { id:"therapist",    label:"Терапевт",       ctx:"Темы: гипертония, диабет 2 типа, холестерин, ОРВИ, витамины, хроническая усталость, ожирение. Мифы о БАДах, народном лечении, антибиотиках. Аудитория широкая, 30–60 лет. Акцент на профилактику." },
  { id:"endocrinology",label:"Эндокринолог",   ctx:"Темы: диабет 2 типа, гипотиреоз, лишний вес, метаболизм, щитовидная железа, инсулинорезистентность. Мифы о похудении, детокс-диетах, сахаре. Аудитория — люди с лишним весом и гормональными проблемами." },
  { id:"pediatrics",   label:"Педиатр",        ctx:"Темы: ОРВИ, прививки, аллергия, питание детей, развитие, антибиотики. Мифы о прививках, закаливании, гомеопатии. Аудитория — родители 25–40. Тон: поддерживающий, без осуждения родительских ошибок." },
  { id:"infectious",   label:"Инфекционист",   ctx:"Темы: гепатит B и C, ВИЧ, COVID, кишечные инфекции, антибиотикорезистентность. Мифы об иммунитете, 'слабом иммунитете'. Аудитория широкая. Акцент на снятие стигмы и страхов, доступное лечение." },
  { id:"urology",      label:"Уролог",         ctx:"Темы: простатит, МКБ (камни в почках), цистит, мужское здоровье, эректильная дисфункция, ХПН. Мифы о простатите и народном лечении. Аудитория — мужчины 35–60. Тон: деликатный, без стеснения." },
  { id:"dermatology",  label:"Дерматолог",     ctx:"Темы: акне, псориаз, атопический дерматит, грибок, родинки, выпадение волос. Мифы о питании и коже, народных мазях, 'зашлакованности'. Аудитория — молодёжь и взрослые. Акцент на современное лечение." },
  { id:"cosmetology",  label:"Косметолог",     ctx:"Темы: ботокс, филлеры, пилинги, биоревитализация, омоложение, уход за кожей. Мифы о 'синдроме маски', натуральной косметике. Аудитория — женщины 28–50. Тон: уверенность в себе, без осуждения желания выглядеть хорошо." },
];

const FORMAT_LABELS = { myth:"Миф → правда", pain:"Боль → решение", education:"Образовательный", symptom:"Симптом → приём" };

let selectedSpec = SPECS[0];
let apiKey = document.getElementById('apiKey')?.value || '';
let originalRows = [];

function checkKey() {
  const val = document.getElementById('apiKey').value.trim();
  document.getElementById('apiDot').className = 'api-dot' + (val.startsWith('AIza') ? ' ok' : '');
}

function buildSpecGrid() {
  const grid = document.getElementById('specGrid');
  SPECS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'spec-btn' + (s.id === selectedSpec.id ? ' active' : '');
    btn.textContent = s.label;
    btn.onclick = () => {
      selectedSpec = s;
      document.querySelectorAll('.spec-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
    grid.appendChild(btn);
  });
}
document.addEventListener("DOMContentLoaded", buildSpecGrid);

function checkKey() {
  const val = document.getElementById('apiKey').value.trim();
  document.getElementById('apiDot').className = 'api-dot' + (val.startsWith('AIza') ? ' ok' : '');
}



const SYSTEM_PROMPT = `Ты — опытный сценарист медицинских Reels для Instagram. Клиника доказательной медицины "Орминь", Душанбе, Таджикистан.

СТИЛЬ (строго):
- Язык: русский, живой разговорный — не учебник
- Тон: эмпатия + уверенность. Не пугать — объяснять и давать надежду
- Обращение: "вы"
- Позиционирование клиники: "Лечим по науке, без запугивания и лишних таблеток"

СТРУКТУРА ДУГИ (всегда):
1. Крючок — с первой секунды бьёт в живую боль или страх пациента
2. Боль — показываем как это влияет на жизнь (нарезка кадров)
3. Миф — что пациент обычно думает/делает неправильно
4. Правда — наука простым языком
5. Последствия — что будет если лечить неправильно
6. Надежда — современное лечение работает
7. CTA — призыв на приём

ЭТАЛОН (сценарий про мигрень который дал реальных пациентов):
Крючок: "Вы можете годами лечить 'сосуды', 'остеохондроз' или 'давление', но боль будет возвращаться снова и снова."
Визуал: врач стоя, кадр издалека и приближается, напряжённый звук
...финал: "Терпеть мигрень — значит терять свою жизнь зря. А лечение — это возможность вернуть её."
...CTA: "До встречи на приёмах"

ВИЗУАЛЬНЫЕ ТИПЫ — ровно 7, используй только их:
1. "Говорящая голова: [позиция врача, эмоция, действие]"
2. "Нарезка: [2-3 конкретных кадра через точку с запятой]"
3. "Нарезка стоковых кадров: [2-3 конкретных стоковых кадра через точку с запятой]"
4. "Анимация: [что именно анимируется]"
5. "Инфографика/схема: [что показывает схема]"
6. "Демонстрация: [врач показывает что именно]"
7. "Текст на экране: [точный текст который появляется]"
ПРАВИЛО МОНТАЖА: каждый кадр 2-3 секунды, в нарезке 2-4 конкретных кадра, никаких размытых описаний.

КОЛИЧЕСТВО СТРОК: 8–10 на 60 сек, 10–13 на 90 сек, 6–8 на 45 сек.
Каждая мысль — один раз. Никаких повторов и дублирования смысла между строками.
Каждая строка должна двигать историю вперёд — если строка не добавляет новую мысль, удали её.
Текст плотный и ёмкий — без воды, без затяжек.

ТОНАЛЬНОСТЬ — СТРОГО:
Никогда не обвиняй и не осуждай зрителя. Даже намёком.
Но и не сюсюкай — без слащавости, без излишней мягкости.
Тон: уверенный врач который говорит по делу, но с уважением к зрителю.

Крючок — короткий (1-2 предложения максимум), бьёт в конкретную боль или ситуацию:
❌ "Вы ждёте пока само пройдёт?" — обвинение
❌ "Каждому родителю хочется защитить своего ребёнка..." — сюсюканье, слишком длинно
✅ "Прыщи у подростка — это не просто косметика. Это его уверенность в себе." — факт + боль, коротко
✅ "Мигрень возвращается снова и снова — даже после таблеток?" — ситуация без осуждения
✅ "Многие годами лечат сосуды. А боль не уходит." — факт, сочувствие, без упрёка

Зритель должен почувствовать: врач понимает мою ситуацию и говорит по делу.

ПОСЛЕДНИЕ ДВЕ СТРОКИ — всегда именно так:
{"text":"До встречи на приёмах","visual":"Говорящая голова: врач за своим столом","caption":""}
{"text":"Аутро","visual":"Логотип и номер клиники","caption":""}

ФОРМАТ ОТВЕТА:
Ответь ТОЛЬКО валидным JSON объектом. Никакого текста до или после. Никаких markdown блоков. Никаких пояснений. Только JSON:
{"title":"...","rows":[{"text":"...","visual":"...","caption":"..."}]}`;

async function generate() {
  const topic = document.getElementById('topic').value.trim();
  if (!topic) {
    document.getElementById('errorMsg').textContent = 'Введи тему или диагноз';
    return;
  }
  document.getElementById('errorMsg').textContent = '';

  const format = document.getElementById('format').value;
  const audience = document.getElementById('audience').value;
  const duration = document.getElementById('duration').value;
  const context = document.getElementById('context').value.trim();

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  document.getElementById('status').textContent = 'Генерирую сценарий...';
  document.getElementById('result').classList.remove('visible');

  const userMsg = `Специальность: ${selectedSpec.label}
Контекст специальности: ${selectedSpec.ctx}
Тема: ${topic}
Формат: ${FORMAT_LABELS[format]}
Аудитория: ${audience}
Длина: ~${duration} секунд${context ? '\nДоп. контекст: ' + context : ''}`;

  try {
    const resp = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ role: 'user', parts: [{ text: SYSTEM_PROMPT + '\n\n' + userMsg }] }],
          generationConfig: { temperature: 0.85, maxOutputTokens: 4096, responseMimeType: 'application/json' }
        })
      }
    );

    const data = await resp.json();

    if (!resp.ok) {
      const msg = data?.error?.message || 'Ошибка API';
      const model = document.getElementById('modelSelect')?.value || 'unknown';
      throw new Error(`[${model}] ${msg}`);
    }

    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    let parsed;
    try {
      const clean = raw.replace(/```json|```/g, '').trim();
      // find JSON object in response
      const start = clean.indexOf('{');
      const end = clean.lastIndexOf('}');
      if (start === -1 || end === -1) throw new Error('no json');
      parsed = JSON.parse(clean.slice(start, end + 1));
    } catch(e) {
      throw new Error('Не удалось разобрать ответ. Попробуй ещё раз.');
    }

    renderTable(parsed, topic, duration);
    document.getElementById('status').textContent = '';
    document.getElementById('result').classList.add('visible');
  } catch(err) {
    document.getElementById('errorMsg').textContent = err.message || 'Ошибка. Попробуй ещё раз.';
    document.getElementById('status').textContent = '';
  }

  btn.disabled = false;
}

function countWords(text) {
  return (text || '').trim().split(/\s+/).filter(w => w.length > 0).length;
}

function wordsToSec(words) {
  return Math.round(words / 95 * 60);
}

function getTag(visual) {
  if (!visual) return '';
  const v = visual.toLowerCase();
  if (v.startsWith('говорящая') || v.includes('говорящая голова')) return '<span class="vtag vtag-head">говорящая голова</span><br>';
  if (v.includes('сток')) return '<span class="vtag vtag-cut-stock">сток</span><br>';
  if (v.startsWith('нарезка')) return '<span class="vtag vtag-cut">нарезка</span><br>';
  if (v.includes('инфограф') || v.includes('схем')) return '<span class="vtag vtag-schema">инфографика</span><br>';
  if (v.startsWith('анимац')) return '<span class="vtag vtag-anim">анимация</span><br>';
  if (v.startsWith('демонстрац') || v.includes('демонстрир')) return '<span class="vtag vtag-demo">демонстрация</span><br>';
  if (v.startsWith('текст на') || v.includes('текст на экране')) return '<span class="vtag vtag-text">текст на экране</span><br>';
  return '';
}

function stripTag(v) {
  return (v || '').replace(/^(Говорящая голова:|Нарезка:|Анимация\/инфографика:|Анимация:|Инфографика:)/i, '').trim();
}

function renderTable(data, topic, duration) {
  document.getElementById('resultName').textContent = data.title || topic;
  document.getElementById('resultBadge').textContent = `${selectedSpec.label} · ~${duration} сек · ${(data.rows||[]).length} строк`;
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  (data.rows || []).forEach((row, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="row-n">${String(i+1).padStart(2,'0')}</span>${row.text || ''}</td>
      <td>${getTag(row.visual)}${stripTag(row.visual)}</td>
      <td>${row.caption
        ? `<span class="caption-text">${row.caption}</span>`
        : `<span class="caption-empty">—</span>`
      }</td>`;
    tbody.appendChild(tr);
  });
}

let editMode = false;

function toggleEdit() {
  editMode = !editMode;
  const views = document.querySelectorAll('.cell-view');
  const edits = document.querySelectorAll('.cell-edit');
  const editBtn = document.getElementById('editBtn');
  const saveBtn = document.getElementById('saveEditsBtn');

  views.forEach(v => v.style.display = editMode ? 'none' : '');
  edits.forEach(e => e.style.display = editMode ? 'block' : 'none');
  editBtn.textContent = editMode ? 'Отмена' : 'Редактировать';
  saveBtn.style.display = editMode ? 'inline-block' : 'none';

  if (editMode) {
    document.querySelectorAll('.cell-edit').forEach(ta => {
      ta.addEventListener('input', updateTotals);
    });
  }
}

function updateTotals() {
  const rows = document.querySelectorAll('#tableBody tr');
  let total = 0;
  rows.forEach(tr => {
    const ta = tr.querySelectorAll('textarea.cell-edit')[0];
    const textVal = ta ? ta.value : tr.querySelector('.cell-view')?.textContent || '';
    const isOutro = textVal.toLowerCase().includes('аутро');
    const words = countWords(textVal);
    const sec = wordsToSec(words);
    total += words;
    const timeCell = tr.querySelector('.time-cell');
    if (timeCell) timeCell.textContent = isOutro ? '—' : sec + ' с';
  });
  const tw = document.getElementById('totalWords');
  const tt = document.getElementById('totalTime');
  if (tw) tw.textContent = total;
  if (tt) tt.textContent = '~' + wordsToSec(total) + ' с';
}

function saveEdits() {
  const rows = document.querySelectorAll('#tableBody tr');
  const editedRows = [];
  rows.forEach((tr, i) => {
    const textareas = tr.querySelectorAll('textarea.cell-edit');
    editedRows.push({
      text: textareas[0]?.value || '',
      visual: textareas[1]?.value || '',
      caption: textareas[2]?.value || ''
    });
  });

  // Build comparison for learning
  const changes = [];
  editedRows.forEach((edited, i) => {
    const orig = originalRows[i] || {};
    if (edited.text !== orig.text || edited.visual !== orig.visual || edited.caption !== orig.caption) {
      changes.push({
        row: i + 1,
        original: { text: orig.text, visual: orig.visual, caption: orig.caption },
        edited: { text: edited.text, visual: edited.visual, caption: edited.caption }
      });
    }
  });

  // Apply edits to view
  rows.forEach((tr, i) => {
    const textareas = tr.querySelectorAll('textarea.cell-edit');
    const views = tr.querySelectorAll('.cell-view');
    if (views[0]) views[0].textContent = textareas[0]?.value || '';
    if (views[1]) {
      const newVisual = textareas[1]?.value || '';
      views[1].textContent = stripTag(newVisual);
      const tagSpan = tr.querySelector('.vtag');
      if (tagSpan) tagSpan.outerHTML = getTag(newVisual);
    }
    if (views[2]) {
      const cap = textareas[2]?.value || '';
      views[2].innerHTML = cap ? `<span class="caption-text">${cap}</span>` : `<span class="caption-empty">—</span>`;
    }
  });

  // Export changes as text for learning
  if (changes.length > 0) {
    let log = `=== ПРАВКИ: ${document.getElementById('resultName').textContent} ===
`;
    log += `Специальность: ${selectedSpec.label}

`;
    changes.forEach(c => {
      log += `Строка ${c.row}:
`;
      if (c.original.text !== c.edited.text) {
        log += `  ТЕКСТ было: ${c.original.text}
`;
        log += `  ТЕКСТ стало: ${c.edited.text}
`;
      }
      if (c.original.visual !== c.edited.visual) {
        log += `  ВИЗУАЛ было: ${c.original.visual}
`;
        log += `  ВИЗУАЛ стало: ${c.edited.visual}
`;
      }
      if (c.original.caption !== c.edited.caption) {
        log += `  ТИТР было: ${c.original.caption || '—'}
`;
        log += `  ТИТР стало: ${c.edited.caption || '—'}
`;
      }
      log += '
';
    });
    navigator.clipboard.writeText(log).then(() => {
      const btn = document.getElementById('saveEditsBtn');
      btn.textContent = 'Правки скопированы!';
      setTimeout(() => btn.textContent = 'Сохранить правки', 2000);
    });
  }

  toggleEdit();
}

function copyTable() {
  const rows = document.querySelectorAll('#tableBody tr');
  let txt = 'Текст\tВизуальный ряд\tАкцентные титры\n';
  rows.forEach(tr => {
    const cells = tr.querySelectorAll('td');
    txt += Array.from(cells).map(td => td.innerText.replace(/\n/g,' ').trim()).join('\t') + '\n';
  });
  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = 'Скопировано!';
    setTimeout(() => btn.textContent = 'Копировать таблицу', 2000);
  });
}
